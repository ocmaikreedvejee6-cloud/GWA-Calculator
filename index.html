<!DOCTYPE html>
<html>
  <head>
    <title>GWA Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="bg1" class="background"></div>
    <div id="bg2" class="background"></div>
    <div class="container">
      <h1>GWA Calculator</h1>

      <div id="subjects">
        <div class="subject">
          <input type="number" class="grade" placeholder="Grade" />
          <input type="number" class="unit" placeholder="Units" />
          <button class="removeBtn">✖</button>
        </div>
      </div>

      <button id="addSubjectBtn">Add Subject</button>

      <button id="calculateBtn">Calculate GWA</button>

      <h2 id="result">GWA:</h2>
    </div>

    <script src="script.js"></script>
  </body>
</html>
